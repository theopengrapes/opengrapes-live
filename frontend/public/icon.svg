<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded base -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  <!-- Grapes-style circles representing live video nodes -->
  <circle cx="256" cy="180" r="50" fill="#ffffff" opacity="0.9" />
  <circle cx="196" cy="270" r="50" fill="#ffffff" opacity="0.9" />
  <circle cx="316" cy="270" r="50" fill="#ffffff" opacity="0.9" />
  <circle cx="256" cy="360" r="50" fill="#ffffff" opacity="0.9" />
  <!-- Connecting lines -->
  <line x1="256" y1="180" x2="196" y2="270" stroke="#ffffff" stroke-width="8" opacity="0.5" />
  <line x1="256" y1="180" x2="316" y2="270" stroke="#ffffff" stroke-width="8" opacity="0.5" />
  <line x1="196" y1="270" x2="256" y2="360" stroke="#ffffff" stroke-width="8" opacity="0.5" />
  <line x1="316" y1="270" x2="256" y2="360" stroke="#ffffff" stroke-width="8" opacity="0.5" />
</svg>
